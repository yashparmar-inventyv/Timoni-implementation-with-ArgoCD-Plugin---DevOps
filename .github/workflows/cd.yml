name: Timoni CD

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # BETA — auto deploys, no approval needed
  # ─────────────────────────────────────────
  deploy-beta:
    runs-on: self-hosted
    environment: beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null; then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            echo "Timoni already installed"
            timoni version
          fi

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest environments/beta/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "Digest already up-to-date. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update environments/beta/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "/digest:/c\        digest: \"${IMAGE_DIGEST}\"" environments/beta/values.cue

      - name: Generate beta manifests
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p deploy/manifests/beta
          timoni -n creative-studio-beta build creative-studio-beta ./modules/creative-studio \
            --values environments/beta/values.cue \
            > deploy/manifests/beta/all.yaml

      - name: Commit and push beta changes
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/beta/values.cue deploy/manifests/beta/all.yaml
          git commit -m "chore(beta): promote image ${IMAGE_DIGEST}"
          git push origin main

  # ─────────────────────────────────────────
  # STAGE — waits for beta + manual approval
  # ─────────────────────────────────────────
  deploy-stage:
    runs-on: self-hosted
    needs: deploy-beta
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null; then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            timoni version
          fi

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest environments/stage/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "Digest already up-to-date. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update environments/stage/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "/digest:/c\        digest: \"${IMAGE_DIGEST}\"" environments/stage/values.cue

      - name: Generate stage manifests
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p deploy/manifests/stage
          timoni -n creative-studio-stage build creative-studio-stage ./modules/creative-studio \
            --values environments/stage/values.cue \
            > deploy/manifests/stage/all.yaml

      - name: Commit and push stage changes
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add environments/stage/values.cue deploy/manifests/stage/all.yaml
          git commit -m "chore(stage): promote image ${IMAGE_DIGEST}"
          git push origin main

  # ─────────────────────────────────────────
  # PROD — waits for stage + manual approval
  # ─────────────────────────────────────────
  deploy-prod:
    runs-on: self-hosted
    needs: deploy-stage
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Timoni is installed
        run: |
          if ! command -v timoni &> /dev/null; then
            echo "Installing Timoni..."
            curl -sSL https://github.com/stefanprodan/timoni/releases/latest/download/timoni-linux-amd64.tar.gz | tar -xz
            sudo mv timoni /usr/local/bin/
          else
            timoni version
          fi

      - name: Set image digest
        run: echo "IMAGE_DIGEST=${{ github.event.client_payload.image_digest }}" >> $GITHUB_ENV

      - name: Sync repository
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check if digest changed
        id: check
        run: |
          CURRENT=$(grep digest modules/creative-studio/values.cue | awk '{print $2}' | tr -d '"')
          if [ "$CURRENT" = "$IMAGE_DIGEST" ]; then
            echo "Digest already up-to-date. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update modules/creative-studio/values.cue
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "/digest:/c\        digest: \"${IMAGE_DIGEST}\"" modules/creative-studio/values.cue

      - name: Generate prod manifests
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p deploy/manifests/prod
          timoni -n creative-studio-prod build creative-studio-prod ./modules/creative-studio \
            --values modules/creative-studio/values.cue \
            > deploy/manifests/prod/all.yaml

      - name: Commit and push prod changes
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add modules/creative-studio/values.cue deploy/manifests/prod/all.yaml
          git commit -m "chore(prod): promote image ${IMAGE_DIGEST}"
          git push origin main
