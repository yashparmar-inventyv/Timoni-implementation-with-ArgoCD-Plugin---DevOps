apiVersion: v1
kind: Secret
metadata:
  name: creative-studio-secrets
  namespace: creative-studio
stringData:
  CLOUDINARY_KEY: "245894724521338"
  CLOUDINARY_NAME: dztttq7sx
  CLOUDINARY_SECRET: Fk1Zd7tl28uRnz76KwAS8LVlfno
  CLOUDINARY_URL: cloudinary://245894724521338:Fk1Zd7tl28uRnz76KwAS8LVlfno@dztttq7sx
type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: creative-studio
  namespace: creative-studio
spec:
  minReadySeconds: 5
  replicas: 2
  selector:
    matchLabels:
      app: creative-studio
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: creative-studio
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: creative-studio-secrets
        image: demo.goharbor.io/creative-studio/creative-studio@sha256:f1ff4dca185762db6b5f77c5c2ef847eee2b1bb03ff8bd9bc084cf6e8079ac9b
        name: creative-studio
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: 400m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /app/data
          name: app-storage
      imagePullSecrets:
      - name: harbor-secret
      volumes:
      - name: app-storage
        persistentVolumeClaim:
          claimName: creative-studio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: creative-studio-service
  namespace: creative-studio
spec:
  ports:
  - name: http
    port: 5000
    protocol: TCP
    targetPort: 3000
  selector:
    app: creative-studio
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: creative-studio
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: creative-studio
spec:
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
  podSelector:
    matchLabels:
      app: creative-studio
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-creative-studio-ingress
  namespace: creative-studio
spec:
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 3000
      protocol: TCP
  podSelector:
    matchLabels:
      app: creative-studio
  policyTypes:
  - Ingress
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: creative-studio-quota
  namespace: creative-studio
spec:
  hard:
    limits.cpu: 1500m
    limits.memory: 1.5Gi
    pods: "10"
    requests.cpu: 800m
    requests.memory: 768Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: creative-studio-limits
  namespace: creative-studio
spec:
  limits:
  - default:
      cpu: 400m
      memory: 512Mi
    defaultRequest:
      cpu: 150m
      memory: 256Mi
    type: Container
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: creative-studio-pvc
  namespace: creative-studio
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
